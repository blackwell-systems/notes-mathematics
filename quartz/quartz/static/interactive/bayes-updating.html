<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beta-Binomial Bayesian Updating</title>
<style>
  :root {
    --bg: #fbfcfd;
    --text: #1c2126;
    --muted: #5a6472;
    --gray: #9aa4b0;
    --orange: #e08a2b;
    --blue: #2563c9;
    --line: #dde3ea;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 16px 12px 28px;
  }
  .wrap { width: 100%; max-width: 760px; }
  h1 { font-size: 18px; margin: 0 0 4px; font-weight: 650; }
  .caption { color: var(--muted); font-size: 13px; margin: 0 0 14px; line-height: 1.45; }
  canvas { width: 100%; height: auto; display: block; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
  .legend { display: flex; gap: 18px; flex-wrap: wrap; font-size: 12.5px; margin: 8px 2px 4px; color: var(--muted); }
  .legend b { font-weight: 600; }
  .sw { display: inline-block; width: 14px; height: 3px; border-radius: 2px; vertical-align: middle; margin-right: 5px; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 22px; margin: 14px 0 6px; }
  .ctl { font-size: 13px; }
  .ctl label { display: flex; justify-content: space-between; margin-bottom: 3px; color: var(--text); }
  .ctl label span.v { color: var(--blue); font-variant-numeric: tabular-nums; font-weight: 600; }
  input[type=range] { width: 100%; accent-color: var(--blue); margin: 0; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 4px; }
  button {
    font: inherit; font-size: 12.5px; padding: 6px 11px; border-radius: 7px;
    border: 1px solid var(--line); background: #fff; color: var(--text); cursor: pointer;
  }
  button:hover { border-color: var(--blue); color: var(--blue); }
  .readout {
    margin-top: 14px; border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px;
    font-size: 13.5px; line-height: 1.6; background: #fff;
  }
  .readout .row { display: flex; justify-content: space-between; gap: 12px; }
  .readout .k { color: var(--muted); }
  .readout .n { font-variant-numeric: tabular-nums; }
  .readout .post { color: var(--blue); font-weight: 600; }
  .readout .note { margin-top: 8px; color: var(--muted); font-size: 12.5px; border-top: 1px solid var(--line); padding-top: 8px; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.94em; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Beta&ndash;Binomial Bayesian updating</h1>
  <p class="caption">Choose a Beta prior over the heads-probability &theta; and some coin-flip data; the posterior is the prior reweighted by the likelihood, and it concentrates as data accumulates.</p>

  <canvas id="cv" width="1520" height="760"></canvas>
  <div class="legend">
    <span><span class="sw" style="background:var(--gray)"></span><b>Prior</b> Beta(&alpha;,&beta;)</span>
    <span><span class="sw" style="background:var(--orange)"></span><b>Likelihood</b> (scaled)</span>
    <span><span class="sw" style="background:var(--blue)"></span><b>Posterior</b> Beta(&alpha;+k,&beta;+n&minus;k)</span>
  </div>

  <div class="controls">
    <div class="ctl"><label>Prior &alpha; <span class="v" id="va">2.0</span></label><input type="range" id="a" min="0.5" max="10" step="0.1" value="2"></div>
    <div class="ctl"><label>Prior &beta; <span class="v" id="vb">2.0</span></label><input type="range" id="b" min="0.5" max="10" step="0.1" value="2"></div>
    <div class="ctl"><label>Flips n <span class="v" id="vn">10</span></label><input type="range" id="n" min="0" max="50" step="1" value="10"></div>
    <div class="ctl"><label>Heads k <span class="v" id="vk">7</span></label><input type="range" id="k" min="0" max="50" step="1" value="7"></div>
  </div>

  <div class="presets">
    <button data-p="uniform">Uniform prior Beta(1,1)</button>
    <button data-p="fair">Believe fair Beta(10,10)</button>
    <button data-p="data">Data: 7 of 10 heads</button>
  </div>

  <div class="readout" id="ro"></div>
</div>

<script>
(function () {
  "use strict";
  var cv = document.getElementById("cv"), ctx = cv.getContext("2d");
  var W = cv.width, H = cv.height, DPR = 2; // canvas backing is 2x the CSS layout
  var els = {
    a: document.getElementById("a"), b: document.getElementById("b"),
    n: document.getElementById("n"), k: document.getElementById("k"),
    va: document.getElementById("va"), vb: document.getElementById("vb"),
    vn: document.getElementById("vn"), vk: document.getElementById("vk"),
    ro: document.getElementById("ro")
  };

  var GRAY = "#9aa4b0", ORANGE = "#e08a2b", BLUE = "#2563c9", AXIS = "#c3ccd6", TXT = "#5a6472";
  var N = 400; // sample points across [0,1]

  // log Gamma (Lanczos) — used only for exact display constants, curves use unnormalized densities
  function logGamma(x) {
    var g = 7, c = [0.99999999999980993, 676.5203681218851, -1259.1392167224028,
      771.32342877765313, -176.61502916214059, 12.507343278686905,
      -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
    if (x < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * x)) - logGamma(1 - x);
    x -= 1; var a = c[0], t = x + g + 0.5;
    for (var i = 1; i < g + 2; i++) a += c[i] / (x + i);
    return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(t) - t + Math.log(a);
  }
  function logBeta(p, q) { return logGamma(p) + logGamma(q) - logGamma(p + q); }

  // unnormalized log density of Beta(p,q) at theta, guarding endpoints
  function logKernel(theta, p, q) {
    var lt = theta <= 0 ? (p - 1 > 0 ? -1e9 : (p - 1 < 0 ? 1e9 : 0)) : (p - 1) * Math.log(theta);
    var lo = theta >= 1 ? (q - 1 > 0 ? -1e9 : (q - 1 < 0 ? 1e9 : 0)) : (q - 1) * Math.log(1 - theta);
    if (theta <= 0 || theta >= 1) {
      // handle boundary spikes: clamp to finite by nudging
      var e = 1e-6, tt = Math.min(1 - e, Math.max(e, theta));
      return (p - 1) * Math.log(tt) + (q - 1) * Math.log(1 - tt);
    }
    return lt + lo;
  }

  // sample an unnormalized Beta(p,q) kernel across [0,1]; return values normalized so max = 1
  function curve(p, q) {
    var xs = new Array(N + 1), lmax = -Infinity;
    for (var i = 0; i <= N; i++) {
      var t = i / N;
      var v = logKernel(t, p, q);
      xs[i] = v;
      if (v > lmax) lmax = v;
    }
    for (var j = 0; j <= N; j++) xs[j] = Math.exp(xs[j] - lmax); // peak = 1
    return xs;
  }

  function fmt(x, d) { return (Math.round(x * Math.pow(10, d)) / Math.pow(10, d)).toFixed(d); }

  function render() {
    var a = parseFloat(els.a.value), b = parseFloat(els.b.value);
    var n = parseInt(els.n.value, 10);
    els.k.max = n;
    var k = Math.min(parseInt(els.k.value, 10), n);
    els.k.value = k;

    els.va.textContent = fmt(a, 1); els.vb.textContent = fmt(b, 1);
    els.vn.textContent = n; els.vk.textContent = k;

    // posterior parameters
    var pa = a + k, pb = b + n - k;

    var prior = curve(a, b);
    var like = curve(k + 1, n - k + 1); // likelihood theta^k (1-k)^(n-k), same kernel as Beta(k+1,n-k+1)
    var post = curve(pa, pb);

    draw(prior, like, post, a, b, n, k, pa, pb);
    readout(a, b, n, k, pa, pb);
  }

  function draw(prior, like, post, a, b, n, k, pa, pb) {
    ctx.clearRect(0, 0, W, H);
    var padL = 56 * DPR, padR = 24 * DPR, padT = 26 * DPR, padB = 54 * DPR;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var x0 = padL, y0 = H - padB;

    function px(t) { return x0 + t * plotW; }
    function py(v) { return y0 - v * plotH * 0.92; } // 0..1 mapped, small headroom

    // grid + x-axis ticks
    ctx.lineWidth = 1 * DPR;
    ctx.strokeStyle = "#eef2f6";
    ctx.fillStyle = TXT;
    ctx.font = (22) + "px system-ui, sans-serif";
    ctx.textAlign = "center";
    for (var g = 0; g <= 10; g++) {
      var t = g / 10, X = px(t);
      ctx.beginPath(); ctx.moveTo(X, padT); ctx.lineTo(X, y0); ctx.stroke();
      if (g % 2 === 0) ctx.fillText(fmt(t, 1), X, y0 + 34 * DPR / DPR + 8);
    }
    // axes
    ctx.strokeStyle = AXIS; ctx.lineWidth = 1.5 * DPR;
    ctx.beginPath(); ctx.moveTo(x0, padT); ctx.lineTo(x0, y0); ctx.lineTo(x0 + plotW, y0); ctx.stroke();
    ctx.fillText("θ  (probability of heads)", x0 + plotW / 2, H - 12);

    function stroke(vals, color, width, dash) {
      ctx.save();
      ctx.strokeStyle = color; ctx.lineWidth = width * DPR; ctx.setLineDash(dash || []);
      ctx.lineJoin = "round";
      ctx.beginPath();
      for (var i = 0; i <= N; i++) {
        var X = px(i / N), Y = py(vals[i]);
        if (i === 0) ctx.moveTo(X, Y); else ctx.lineTo(X, Y);
      }
      ctx.stroke();
      ctx.restore();
    }
    function fill(vals, color) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(px(0), y0);
      for (var i = 0; i <= N; i++) ctx.lineTo(px(i / N), py(vals[i]));
      ctx.lineTo(px(1), y0); ctx.closePath();
      ctx.fillStyle = color; ctx.fill();
      ctx.restore();
    }

    fill(post, "rgba(37,99,201,0.10)");
    stroke(prior, GRAY, 2, [7 * DPR, 6 * DPR]);
    stroke(like, ORANGE, 2, [2 * DPR, 5 * DPR]);
    stroke(post, BLUE, 3);

    // vertical markers: MLE (orange) and posterior mean (blue)
    function vline(t, color, label, above) {
      if (t < 0 || t > 1 || isNaN(t)) return;
      var X = px(t);
      ctx.save();
      ctx.strokeStyle = color; ctx.lineWidth = 1.5 * DPR; ctx.setLineDash([3 * DPR, 4 * DPR]);
      ctx.beginPath(); ctx.moveTo(X, padT); ctx.lineTo(X, y0); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = color; ctx.font = "600 21px system-ui, sans-serif";
      ctx.textAlign = X > x0 + plotW * 0.82 ? "right" : "left";
      ctx.fillText(label, X + (ctx.textAlign === "right" ? -6 : 6), padT + (above ? 18 : 40));
      ctx.restore();
    }
    var postMean = pa / (pa + pb);
    var priorMean = a / (a + b);
    if (n > 0) vline(k / n, ORANGE, "MLE", true);
    vline(postMean, BLUE, "post. mean", false);
    // prior mean tick (subtle)
    vline(priorMean, "rgba(154,164,176,0.9)", "prior mean", n > 0 ? true : false);
  }

  function readout(a, b, n, k, pa, pb) {
    var postMean = pa / (pa + pb);
    var priorMean = a / (a + b);
    var mode = (pa > 1 && pb > 1) ? (pa - 1) / (pa + pb - 2) : null;
    var mle = n > 0 ? k / n : null;
    var rows = "";
    rows += row("Prior", "Beta(" + fmt(a, 1) + ", " + fmt(b, 1) + "),  mean " + fmt(priorMean, 3), "");
    rows += row("Data", k + " heads in " + n + " flips", "");
    rows += row("Posterior", "Beta(" + fmt(pa, 1) + ", " + fmt(pb, 1) + ")", "post");
    rows += row("Posterior mean", "(α+k)/(α+β+n) = " + fmt(postMean, 3), "");
    rows += row("Posterior mode (MAP)", mode === null ? "undefined (needs α+k, β+n−k > 1)" : fmt(mode, 3), "");
    rows += row("MLE", mle === null ? "undefined (n = 0)" : "k/n = " + fmt(mle, 3), "");

    var note;
    if (n === 0) {
      note = "With no data the posterior equals the prior: belief is unchanged.";
    } else {
      var pull = mle - priorMean;
      var dir = Math.abs(pull) < 1e-9 ? "sits at" : (pull > 0 ? "is pulled up from the prior mean toward" : "is pulled down from the prior mean toward");
      note = "The posterior mean " + fmt(postMean, 3) + " " + dir + " the MLE " + fmt(mle, 3) +
             "; the shrinkage weight α+β vs n shrinks as data grows, so more flips concentrate the posterior on the MLE.";
    }
    els.ro.innerHTML = rows + '<div class="note">' + note + '</div>';
  }
  function row(kk, vv, cls) {
    return '<div class="row"><span class="k">' + kk + '</span><span class="n ' + cls + '">' + vv + '</span></div>';
  }

  ["a", "b", "n", "k"].forEach(function (id) {
    els[id].addEventListener("input", render);
  });

  document.querySelectorAll("button[data-p]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var p = btn.getAttribute("data-p");
      if (p === "uniform") { els.a.value = 1; els.b.value = 1; }
      else if (p === "fair") { els.a.value = 10; els.b.value = 10; }
      else if (p === "data") { els.n.value = 10; els.k.value = 7; }
      render();
    });
  });

  render();
})();
</script>

<script>/* AUTOFIT-INJECTED: size own iframe to content, no scrollbar */
(function () {
  var last = 0;
  function fit() {
    try {
      var fe = window.frameElement;
      if (!fe) return;
      var h = Math.max(
        document.body ? document.body.scrollHeight : 0,
        document.documentElement.scrollHeight
      );
      if (h && Math.abs(h - last) > 2) { last = h; fe.style.height = h + "px"; }
    } catch (e) { /* cross-origin or detached: leave the hardcoded height */ }
  }
  window.addEventListener("load", function () { fit(); setTimeout(fit, 150); setTimeout(fit, 600); });
  window.addEventListener("resize", fit);
  if (window.ResizeObserver) {
    try { new ResizeObserver(fit).observe(document.body); } catch (e) {}
  }
})();
</script>
</body>
</html>
