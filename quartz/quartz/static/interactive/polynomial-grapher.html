<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polynomial Grapher</title>
<style>
  :root{
    --bg:#fbfcfd; --fg:#1c2126; --curve:#2563c9; --ref:#c0392b;
    --grid:#e3e8ee; --gridax:#9aa6b2; --panel:#f2f5f8; --border:#d5dde5;
  }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  .wrap{max-width:760px;margin:0 auto;padding:14px 12px 26px;}
  h1{font-size:19px;margin:0 0 4px;}
  .cap{font-size:13px;color:#48525c;margin:0 0 12px;line-height:1.4;}
  canvas{width:100%;height:auto;display:block;border:1px solid var(--border);
    border-radius:6px;background:#fff;}
  .controls{margin-top:12px;}
  .presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  button{font:inherit;font-size:12.5px;background:#fff;color:var(--fg);
    border:1px solid var(--border);border-radius:5px;padding:5px 9px;cursor:pointer;}
  button:hover{background:#eef3f8;}
  button.mini{padding:2px 8px;font-size:13px;line-height:1.3;}
  .lead{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;}
  .lead input{width:70px;}
  input[type=number]{font:inherit;font-size:13px;padding:3px 5px;
    border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--fg);}
  table.roots{border-collapse:collapse;font-size:13px;margin-bottom:6px;}
  table.roots th{text-align:left;font-weight:600;padding:2px 8px 4px 0;color:#48525c;}
  table.roots td{padding:2px 8px 2px 0;}
  table.roots input{width:64px;}
  .readout{margin-top:14px;background:var(--panel);border:1px solid var(--border);
    border-radius:6px;padding:12px 14px;font-size:13px;line-height:1.55;}
  .readout h2{font-size:14px;margin:0 0 6px;}
  .readout ul{margin:4px 0 10px;padding-left:20px;}
  .readout li{margin:1px 0;}
  .readout .lbl{font-weight:600;}
  code{background:#e7edf3;padding:1px 5px;border-radius:4px;font-size:12.5px;}
  .cross{color:var(--ref);font-weight:600;}
  .touch{color:#7a5c00;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Polynomial grapher (factored form)</h1>
  <p class="cap">Enter a polynomial by its real roots and their multiplicities: the curve <em>crosses</em> the x-axis at odd-multiplicity roots and <em>touches (bounces off)</em> at even-multiplicity roots.</p>

  <canvas id="cv" width="1500" height="900"></canvas>

  <div class="controls">
    <div class="presets" id="presets"></div>
    <div class="lead">
      <span class="lbl">Leading coefficient a =</span>
      <input type="number" id="lead" step="1" value="1">
      <span style="color:#48525c">f(x) = a &middot; &prod; (x &minus; r<sub>i</sub>)<sup>m<sub>i</sub></sup></span>
    </div>
    <table class="roots">
      <thead><tr><th>root r</th><th>multiplicity (1–4)</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <button class="mini" id="add">+ add root</button>
  </div>

  <div class="readout" id="readout"></div>
</div>

<script>
"use strict";
(function(){
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const DPR_LABEL = 2; // canvas is 2x the CSS px for crispness

  let lead = 1;
  let roots = [];  // {r, m}

  const presets = [
    {name:"(x+1)²(x−2)", a:1, roots:[{r:-1,m:2},{r:2,m:1}]},
    {name:"x³ − x = x(x−1)(x+1)", a:1, roots:[{r:0,m:1},{r:1,m:1},{r:-1,m:1}]},
    {name:"−(x−1)(x−2)(x−3)(x−4)", a:-1, roots:[{r:1,m:1},{r:2,m:1},{r:3,m:1},{r:4,m:1}]},
    {name:"x² (double root at 0)", a:1, roots:[{r:0,m:2}]},
  ];

  // ---- polynomial evaluation from factored form ----
  function f(x){
    let y = lead;
    for(const rt of roots){
      y *= Math.pow(x - rt.r, rt.m);
    }
    return y;
  }
  function degree(){
    let d = 0;
    for(const rt of roots) d += rt.m;
    return d;
  }

  // ---- UI building ----
  function buildPresets(){
    const box = document.getElementById('presets');
    box.innerHTML = '';
    presets.forEach((p)=>{
      const b = document.createElement('button');
      b.textContent = p.name;
      b.onclick = ()=>{
        lead = p.a;
        roots = p.roots.map(o=>({r:o.r,m:o.m}));
        document.getElementById('lead').value = lead;
        renderRows();
        update();
      };
      box.appendChild(b);
    });
  }

  function renderRows(){
    const tb = document.getElementById('rows');
    tb.innerHTML = '';
    roots.forEach((rt, i)=>{
      const tr = document.createElement('tr');

      const td1 = document.createElement('td');
      const inR = document.createElement('input');
      inR.type='number'; inR.step='0.5'; inR.value = rt.r;
      inR.oninput = ()=>{ rt.r = parseFloat(inR.value)||0; update(); };
      td1.appendChild(inR); tr.appendChild(td1);

      const td2 = document.createElement('td');
      const inM = document.createElement('input');
      inM.type='number'; inM.min='1'; inM.max='4'; inM.step='1'; inM.value = rt.m;
      inM.oninput = ()=>{
        let m = parseInt(inM.value,10); if(isNaN(m)) m=1;
        m = Math.max(1, Math.min(4, m)); rt.m = m; inM.value = m; update();
      };
      td2.appendChild(inM); tr.appendChild(td2);

      const td3 = document.createElement('td');
      const del = document.createElement('button');
      del.className='mini'; del.textContent='×'; del.title='remove';
      del.onclick = ()=>{ if(roots.length>1){ roots.splice(i,1); renderRows(); update(); } };
      td3.appendChild(del); tr.appendChild(td3);

      tb.appendChild(tr);
    });
  }

  document.getElementById('add').onclick = ()=>{
    roots.push({r:0, m:1}); renderRows(); update();
  };
  document.getElementById('lead').oninput = (e)=>{
    let v = parseFloat(e.target.value);
    if(isNaN(v)||v===0) v = (v===0?1:1);
    lead = parseFloat(e.target.value)===0 ? 0 : v;
    // Disallow a=0 (not a polynomial of this shape)
    if(parseFloat(e.target.value)===0){ lead=1; e.target.value=1; }
    update();
  };

  // ---- turning points: count local extrema on a fine grid ----
  function findTurningPoints(xlo, xhi){
    const N = 4000;
    const dx = (xhi - xlo)/N;
    const pts = [];
    let prevSlopeSign = 0;
    let px = xlo, pfy = f(px);
    for(let k=1;k<=N;k++){
      const x = xlo + k*dx;
      const fy = f(x);
      const slope = fy - pfy;
      let s = slope>0?1:(slope<0?-1:0);
      if(s!==0 && prevSlopeSign!==0 && s!==prevSlopeSign){
        // sign change between px..x -> turning point near midpoint
        pts.push({x:px, y:pfy});
      }
      if(s!==0) prevSlopeSign = s;
      px = x; pfy = fy;
    }
    return pts;
  }

  // ---- rendering ----
  function computeWindow(){
    let rs = roots.map(r=>r.r);
    let lo = Math.min(...rs, 0), hi = Math.max(...rs, 0);
    if(!isFinite(lo)) lo = -3;
    if(!isFinite(hi)) hi = 3;
    let span = hi - lo;
    if(span < 1) span = 2, lo -= 1, hi += 1;
    const pad = Math.max(span*0.35, 1.2);
    return {xlo: lo - pad, xhi: hi + pad};
  }

  function update(){
    const {xlo, xhi} = computeWindow();

    // sample curve for y-range
    const NS = 1400;
    const xs = [], ys = [];
    let ymin = Infinity, ymax = -Infinity;
    for(let k=0;k<=NS;k++){
      const x = xlo + (xhi-xlo)*k/NS;
      const y = f(x);
      xs.push(x); ys.push(y);
      if(isFinite(y)){ if(y<ymin) ymin=y; if(y>ymax) ymax=y; }
    }
    // Clip y-range sensibly using a percentile so tall arms don't crush detail
    const finite = ys.filter(isFinite).slice().sort((a,b)=>a-b);
    if(finite.length){
      const q = 0.04;
      const loP = finite[Math.floor(q*(finite.length-1))];
      const hiP = finite[Math.ceil((1-q)*(finite.length-1))];
      // ensure roots/turning region visible: include 0 and root neighborhood extremes
      let vlo = Math.min(loP, 0), vhi = Math.max(hiP, 0);
      if(vhi - vlo < 1e-6){ vlo -= 1; vhi += 1; }
      const ypad = (vhi - vlo)*0.12;
      ymin = vlo - ypad; ymax = vhi + ypad;
    } else { ymin=-1; ymax=1; }

    drawGraph(xlo, xhi, ymin, ymax, xs, ys);
    drawReadout(xlo, xhi);
  }

  function drawGraph(xlo, xhi, ymin, ymax, xs, ys){
    const padL=70, padR=24, padT=24, padB=54;
    const gw = W - padL - padR, gh = H - padT - padB;
    const X = x => padL + (x - xlo)/(xhi - xlo)*gw;
    const Y = y => padT + (ymax - y)/(ymax - ymin)*gh;

    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,W,H);

    // grid
    ctx.lineWidth = 2;
    ctx.font = '22px system-ui,sans-serif';
    ctx.fillStyle = '#7a848e';
    ctx.textAlign='center'; ctx.textBaseline='top';

    function niceStep(range, target){
      const raw = range/target;
      const mag = Math.pow(10, Math.floor(Math.log10(raw)));
      const norm = raw/mag;
      let step;
      if(norm<1.5) step=1; else if(norm<3) step=2; else if(norm<7) step=5; else step=10;
      return step*mag;
    }
    const xStep = niceStep(xhi-xlo, 9);
    const yStep = niceStep(ymax-ymin, 7);

    // vertical grid lines + x labels
    ctx.strokeStyle = '#e3e8ee';
    ctx.beginPath();
    let x0 = Math.ceil(xlo/xStep)*xStep;
    for(let gx=x0; gx<=xhi+1e-9; gx+=xStep){
      const px = X(gx);
      ctx.moveTo(px, padT); ctx.lineTo(px, padT+gh);
    }
    let y0 = Math.ceil(ymin/yStep)*yStep;
    for(let gy=y0; gy<=ymax+1e-9; gy+=yStep){
      const py = Y(gy);
      ctx.moveTo(padL, py); ctx.lineTo(padL+gw, py);
    }
    ctx.stroke();

    // axes
    ctx.strokeStyle = '#9aa6b2';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const yAxis = (0>=ymin&&0<=ymax) ? Y(0) : null;
    const xAxis = (0>=xlo&&0<=xhi) ? X(0) : null;
    if(yAxis!==null){ ctx.moveTo(padL, yAxis); ctx.lineTo(padL+gw, yAxis); }
    if(xAxis!==null){ ctx.moveTo(xAxis, padT); ctx.lineTo(xAxis, padT+gh); }
    ctx.stroke();

    // axis labels
    ctx.fillStyle = '#7a848e';
    for(let gx=x0; gx<=xhi+1e-9; gx+=xStep){
      if(Math.abs(gx)<1e-9) continue;
      const px = X(gx);
      const py = (yAxis!==null? yAxis: padT+gh) + 6;
      ctx.fillText(fmt(gx), px, Math.min(py, padT+gh+6));
    }
    ctx.textAlign='right'; ctx.textBaseline='middle';
    for(let gy=y0; gy<=ymax+1e-9; gy+=yStep){
      if(Math.abs(gy)<1e-9) continue;
      const py = Y(gy);
      const px = (xAxis!==null? xAxis: padL) - 8;
      ctx.fillText(fmt(gy), Math.max(px, padL-8), py);
    }

    // curve
    ctx.strokeStyle = '#2563c9';
    ctx.lineWidth = 3.5;
    ctx.lineJoin='round';
    ctx.beginPath();
    let started=false;
    for(let k=0;k<xs.length;k++){
      const y = ys[k];
      if(!isFinite(y)){ started=false; continue; }
      const px = X(xs[k]), py = Y(y);
      // guard against runaway offscreen
      const pyc = Math.max(padT-500, Math.min(padT+gh+500, py));
      if(!started){ ctx.moveTo(px, pyc); started=true; }
      else ctx.lineTo(px, pyc);
    }
    ctx.stroke();

    // turning points (hollow)
    const tps = findTurningPoints(xlo, xhi);
    ctx.strokeStyle = '#2563c9';
    ctx.fillStyle = '#ffffff';
    ctx.lineWidth = 2.5;
    for(const tp of tps){
      if(tp.y<ymin||tp.y>ymax) continue;
      ctx.beginPath();
      ctx.arc(X(tp.x), Y(tp.y), 7, 0, 2*Math.PI);
      ctx.fill(); ctx.stroke();
    }

    // roots on x-axis
    const ax = (0>=ymin&&0<=ymax)? Y(0) : padT+gh;
    for(const rt of roots){
      const px = X(rt.r);
      if(rt.r<xlo||rt.r>xhi) continue;
      const even = (rt.m%2===0);
      if(even){
        // touch: hollow red ring
        ctx.beginPath();
        ctx.arc(px, ax, 9, 0, 2*Math.PI);
        ctx.fillStyle='#ffffff'; ctx.fill();
        ctx.strokeStyle='#c0392b'; ctx.lineWidth=3.5; ctx.stroke();
      } else {
        // cross: filled blue dot
        ctx.beginPath();
        ctx.arc(px, ax, 8, 0, 2*Math.PI);
        ctx.fillStyle='#2563c9'; ctx.fill();
      }
    }

    // y-intercept
    const y0v = f(0);
    if(0>=xlo&&0<=xhi && isFinite(y0v) && y0v>=ymin && y0v<=ymax){
      ctx.beginPath();
      ctx.arc(X(0), Y(y0v), 8, 0, 2*Math.PI);
      ctx.fillStyle='#c0392b'; ctx.fill();
    }
  }

  function fmt(v){
    if(Math.abs(v)<1e-9) return '0';
    const r = Math.round(v*100)/100;
    return (Math.abs(r)>=1000) ? r.toExponential(0) : String(r);
  }
  function fmtNum(v){
    const r = Math.round(v*1e6)/1e6;
    return String(r);
  }

  function drawReadout(xlo, xhi){
    const d = degree();
    const a = lead;
    // sort roots for display
    const sorted = roots.slice().sort((p,q)=>p.r-q.r);
    let html = '';

    html += `<h2>f(x) = ${a===1?'':a===-1?'−':a}` +
            sorted.map(rt=>`(x ${rt.r<0?'+ '+(-rt.r):'− '+rt.r})${rt.m>1?'<sup>'+rt.m+'</sup>':''}`).join('') +
            `</h2>`;
    html += `<div><span class="lbl">Degree:</span> ${d} (sum of multiplicities), so <strong>at most ${Math.max(d-1,0)}</strong> turning point${d-1===1?'':'s'}.</div>`;

    // roots
    html += `<div class="lbl" style="margin-top:8px">Real roots:</div><ul>`;
    for(const rt of sorted){
      const even = rt.m%2===0;
      const kind = even
        ? `<span class="touch">touches (bounces)</span> — even multiplicity, tangent to x-axis`
        : `<span class="cross">crosses</span> — odd multiplicity`;
      html += `<li><code>x = ${fmtNum(rt.r)}</code>, multiplicity ${rt.m}: ${kind}</li>`;
    }
    html += `</ul>`;

    // y-intercept
    const y0v = f(0);
    html += `<div><span class="lbl">y-intercept:</span> f(0) = <code>${fmtNum(y0v)}</code> (point (0, ${fmtNum(y0v)}))</div>`;

    // end behavior
    const even = (d%2===0);
    const pos = (a>0);
    let words, limL, limR;
    if(even && pos){ words='both ends point up'; limL='+∞'; limR='+∞'; }
    else if(even && !pos){ words='both ends point down'; limL='−∞'; limR='−∞'; }
    else if(!even && pos){ words='down on the left, up on the right'; limL='−∞'; limR='+∞'; }
    else { words='up on the left, down on the right'; limL='+∞'; limR='−∞'; }
    html += `<div style="margin-top:6px"><span class="lbl">End behavior:</span> degree is ${even?'even':'odd'} and a ${pos?'&gt; 0':'&lt; 0'}, so ${words}.<br>` +
            `<span style="margin-left:14px">as x → −∞, f(x) → ${limL}&nbsp;&nbsp;·&nbsp;&nbsp;as x → +∞, f(x) → ${limR}</span></div>`;

    // turning points
    const tps = findTurningPoints(xlo, xhi);
    html += `<div style="margin-top:6px"><span class="lbl">Turning points found:</span> ${tps.length} in view (${tps.map(t=>'x≈'+fmt(t.x)).join(', ')||'none'}).</div>`;

    html += `<div style="margin-top:8px;font-size:12px;color:#6b7681">Legend: <span style="color:#2563c9">●</span> crossing root &nbsp; <span style="color:#c0392b">◯</span> touching root &nbsp; <span style="color:#c0392b">●</span> y-intercept &nbsp; <span style="color:#2563c9">◯</span> turning point</div>`;

    document.getElementById('readout').innerHTML = html;
  }

  // init
  buildPresets();
  lead = 1;
  roots = [{r:-1,m:2},{r:2,m:1}];
  document.getElementById('lead').value = lead;
  renderRows();
  update();
})();
</script>

<script>/* AUTOFIT-INJECTED: size own iframe to content, no scrollbar */
(function () {
  var last = 0;
  function fit() {
    try {
      var fe = window.frameElement;
      if (!fe) return;
      var h = Math.max(
        document.body ? document.body.scrollHeight : 0,
        document.documentElement.scrollHeight
      );
      if (h && Math.abs(h - last) > 2) { last = h; fe.style.height = h + "px"; }
    } catch (e) { /* cross-origin or detached: leave the hardcoded height */ }
  }
  window.addEventListener("load", function () { fit(); setTimeout(fit, 150); setTimeout(fit, 600); });
  window.addEventListener("resize", fit);
  if (window.ResizeObserver) {
    try { new ResizeObserver(fit).observe(document.body); } catch (e) {}
  }
})();
</script>
</body>
</html>
